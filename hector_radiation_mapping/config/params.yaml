# *** Radiation Mapping Parameters ***
# This parameter file is loaded in the radiation mapping launch files


##########################
# *** General***
##########################

# The number of threads used for the ROS spinner
ros_spinner_threads: 4
# Set to true to enable the online evaluation of the 3D model
enable_online_3d_evaluation: true
# Set to true to enable spatial filtering of samples
enable_spatial_sample_filtering: false
# The export path for the generated radiation maps (relative to the package directory)
export_path: "/../exports/"
# The name of the world frame
world_frame: "world"

# *** ROS topics ***
# The topic on which the radiation measurements are published
subscribe_topic: "/dose_rate"
# The topic on which the accumulated pointcloud of the environment is published
environment_cloud_topic: "/pointcloud_accumulated"
# The topic on which the grid map of the environment is published
environment_map_topic: "/map"
# The key of the CPS value in the radiation message
message_key_cps: "cps"
# The key of the rate value in the radiation message
message_key_rate: "rate"
# The key of the frame id in the radiation message
message_key_frame_id: "frame_id"
# The unit of the radiation values used for display
radiation_unit: "µSv/h"


##########################
# *** GAUSSIAN PROCESS ***
##########################

gp_on_start_up: false

# *** Source prediciton***
# Potential sources need to be at least meanFactor times stronger than the mean value of all measurements
gp_mean_factor: 1
# Potential sources need to have a dose rate of at least minSourceStrength
gp_min_source_strength: 50.0 #in model unit

# *** 2D model ***
# The radius of the circle used for sampling the 2D model
gp_circle_radius: 5.0 # meter
# The minimum distance that a sample needs to the last sample to be included in the model
gp_min_distance_between_samples_2d: 0.2 # meter
# The minimum time between two updates of the 2D model
gp_min_update_time_2d: 2000 # milliseconds

# *** GridMap ***
# The name of the gridmap topic
gp_grid_map_topic: "/grid_map_gp"
# The resolution of the grid map generated by the system
gp_grid_map_resolution: 0.1 # meter

# *** 3D model ***
# The radius of the circle used for sampling the 3D model
gp_local_radius: 5.0 # meter
# The minimum distance that a sample needs to the last sample to be included in the model
gp_min_distance_between_samples_3d: 0.1 # meter
# The minimum time between two updates of the 3D model
gp_min_update_time_3d: 500 # milliseconds

# *** 3D point cloud ***
# The visualization point cloud is downsampled in three distance levels, to improve visibility
# These distances are given below
gp_distance_cutoff_levels: [1.0, 3.0, 5] # meter
# The number of points that are kept in each distance level
gp_point_cloud_3d_size_levels: [15000, 10000, 10000]


##########################
# *** LEAST SQUARES ***
##########################

ls_on_start_up: true
ls_circle_radius: 5.0 # meter
ls_min_update_time: 100 # milliseconds
ls_grid_map_topic: "/grid_map_ls"
ls_grid_map_resolution: 0.1 # meter
ls_max_queue: 20

##########################
# *** BAYESIAN INFERENCE ***
##########################

bi_on_start_up: false
bi_circle_radius: 5.0 # meter
bi_min_update_time: 1000 # milliseconds
bi_grid_map_topic: "/grid_map_bi"
bi_grid_map_resolution: 0.1 # meter

##########################
# *** FIELD PROPAGATION ***
##########################

fp_on_start_up: false
fp_circle_radius: 5.0 # meter
fp_min_update_time: 1000 # milliseconds
fp_grid_map_topic: "/grid_map_fp"
fp_grid_map_resolution: 0.1 # meter
